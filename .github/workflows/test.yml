name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: `pnpm biome check .` and `pnpm typecheck` are intentionally
      # not gated in CI yet — the repo has pre-existing lint/type errors
      # that need a separate cleanup pass. Run them locally when working
      # in the affected areas. CI gates on build, unit tests, docs, and contracts.

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

      - name: OpenAPI contract check
        run: pnpm openapi:check

      - name: Docs build
        run: pnpm docs:build

      - name: Docs and README checks
        run: |
          pnpm docs:check
          pnpm readme:check

      - name: Release policy check
        run: pnpm release:check

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Trigger api.egdata.app PR deployment
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_DEPLOY_KEY: ${{ secrets.COOLIFY_DEPLOY_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ] || [ -z "$COOLIFY_DEPLOY_KEY" ]; then
            echo "Coolify deploy secrets are missing."
            exit 1
          fi
          curl --fail --show-error --silent --retry 3 -X POST "${COOLIFY_DEPLOY_URL}&pr=${PR_NUMBER}" \
            -H "Authorization: Bearer ${COOLIFY_DEPLOY_KEY}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger api.egdata.app deployment
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_DEPLOY_KEY: ${{ secrets.COOLIFY_DEPLOY_KEY }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ] || [ -z "$COOLIFY_DEPLOY_KEY" ]; then
            echo "Coolify deploy secrets are missing."
            exit 1
          fi
          curl --fail --show-error --silent --retry 3 -X POST "$COOLIFY_DEPLOY_URL" \
            -H "Authorization: Bearer ${COOLIFY_DEPLOY_KEY}"
