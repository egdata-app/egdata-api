name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: `pnpm biome check .` and `pnpm typecheck` are intentionally
      # not gated in CI yet — the repo has pre-existing lint/type errors
      # that need a separate cleanup pass. Run them locally when working
      # in the affected areas. CI gates on build, unit tests, docs, and contracts.

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test:unit

      - name: OpenAPI contract check
        run: pnpm openapi:check

      - name: Docs build
        run: pnpm docs:build

      - name: Docs and README checks
        run: |
          pnpm docs:check
          pnpm readme:check

      - name: Release policy check
        run: pnpm release:check

  integration:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require integration secrets
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          MONGO_CA_B64: ${{ secrets.MONGO_CA_B64 }}
          MONGO_CERT_B64: ${{ secrets.MONGO_CERT_B64 }}
        run: |
          if [ -z "$MONGO_URL" ] || [ -z "$MONGO_CA_B64" ] || [ -z "$MONGO_CERT_B64" ]; then
            echo "Required Mongo integration secrets are missing."
            exit 1
          fi

      - name: Write Mongo TLS files
        env:
          MONGO_CA_B64: ${{ secrets.MONGO_CA_B64 }}
          MONGO_CERT_B64: ${{ secrets.MONGO_CERT_B64 }}
        run: |
          mkdir -p .secrets
          echo "$MONGO_CA_B64" | base64 -d > .secrets/mongo-ca.pem
          echo "$MONGO_CERT_B64" | base64 -d > .secrets/mongo-cert.pem
          echo "MONGO_CA=$PWD/.secrets/mongo-ca.pem" >> "$GITHUB_ENV"
          echo "MONGO_CERT=$PWD/.secrets/mongo-cert.pem" >> "$GITHUB_ENV"

      - name: Run full test suite
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          REDISHOST: 127.0.0.1
          REDISPORT: "6379"
          BULL_REDIS_URI: redis://127.0.0.1:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
          MEILISEARCH_INSTANCE: ${{ secrets.MEILISEARCH_INSTANCE }}
          OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
          OPENSEARCH_USERNAME: ${{ secrets.OPENSEARCH_USERNAME }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
          EPIC_CLIENT_ID: ${{ secrets.EPIC_CLIENT_ID }}
          EPIC_CLIENT_SECRET: ${{ secrets.EPIC_CLIENT_SECRET }}
        run: pnpm test

      - name: Route coverage checks
        run: pnpm test:routes

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build, integration]
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Trigger api.egdata.app PR deployment
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_DEPLOY_KEY: ${{ secrets.COOLIFY_DEPLOY_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ] || [ -z "$COOLIFY_DEPLOY_KEY" ]; then
            echo "Coolify deploy secrets are missing."
            exit 1
          fi
          curl --fail --show-error --silent --retry 3 -X POST "${COOLIFY_DEPLOY_URL}&pr=${PR_NUMBER}" \
            -H "Authorization: Bearer ${COOLIFY_DEPLOY_KEY}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build, integration]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger api.egdata.app deployment
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_DEPLOY_KEY: ${{ secrets.COOLIFY_DEPLOY_KEY }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ] || [ -z "$COOLIFY_DEPLOY_KEY" ]; then
            echo "Coolify deploy secrets are missing."
            exit 1
          fi
          curl --fail --show-error --silent --retry 3 -X POST "$COOLIFY_DEPLOY_URL" \
            -H "Authorization: Bearer ${COOLIFY_DEPLOY_KEY}"
